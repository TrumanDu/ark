<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景方形圆角 -->
  <rect x="2" y="2" width="116" height="116" rx="20" fill="url(#gradient1)" stroke="url(#gradient2)" stroke-width="2"/>
  
  <!-- 相机图标主体 -->
  <rect x="35" y="40" width="50" height="35" rx="8" fill="white" opacity="0.9"/>
  
  <!-- 相机镜头 -->
  <circle cx="60" cy="57.5" r="12" fill="url(#gradient3)"/>
  <circle cx="60" cy="57.5" r="8" fill="url(#gradient4)"/>
  <circle cx="60" cy="57.5" r="4" fill="white"/>
  
  <!-- 相机闪光灯 -->
  <rect x="45" y="35" width="8" height="6" rx="2" fill="white" opacity="0.8"/>
  
  <!-- 相机按钮 -->
  <circle cx="70" cy="45" r="3" fill="white" opacity="0.7"/>
  
  <!-- 装饰性元素 - 画笔 -->
  <path d="M25 75 L35 65 L40 70 L30 80 Z" fill="url(#gradient5)" opacity="0.8"/>
  <circle cx="30" cy="80" r="2" fill="url(#gradient5)"/>
  
  <!-- 装饰性元素 - 调色板 -->
  <circle cx="85" cy="75" r="8" fill="url(#gradient6)" opacity="0.8"/>
  <circle cx="82" cy="72" r="2" fill="white"/>
  <circle cx="88" cy="78" r="2" fill="white"/>
  <circle cx="85" cy="80" r="2" fill="white"/>
  
  <!-- 文字 "修图大师" -->
  <text x="60" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">修图大师</text>
  
  <!-- 渐变定义 -->
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 边框渐变 -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <!-- 镜头外圈渐变 -->
    <radialGradient id="gradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </radialGradient>
    
    <!-- 镜头内圈渐变 -->
    <radialGradient id="gradient4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4B5563;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B7280;stop-opacity:1" />
    </radialGradient>
    
    <!-- 画笔渐变 -->
    <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    
    <!-- 调色板渐变 -->
    <radialGradient id="gradient6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
